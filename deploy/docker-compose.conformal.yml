services:
  app:
    build:
      context: ..
      dockerfile: Dockerfile
      args:
        SITE_VARIANT: conformal
    image: conformal-live:latest
    container_name: conformal-live
    environment:
      NODE_ENV: production
      PORT: 3000
      HOSTNAME: 0.0.0.0
      NEXT_TELEMETRY_DISABLED: "1"
      SITE_VARIANT: conformal
      NEXT_PUBLIC_SITE_VARIANT: conformal
    expose:
      - "3000"
    restart: unless-stopped
    networks:
      - cutcompanion_default

networks:
  cutcompanion_default:
    external: true
