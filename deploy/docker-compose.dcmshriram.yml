services:
  app:
    build:
      context: ..
      dockerfile: Dockerfile
      args:
        SITE_VARIANT: dcmshriram
    image: dcmshriram-conformal:latest
    container_name: partner-dcmshriram
    environment:
      NODE_ENV: production
      PORT: 3000
      HOSTNAME: 0.0.0.0
      NEXT_TELEMETRY_DISABLED: "1"
      SITE_VARIANT: dcmshriram
      NEXT_PUBLIC_SITE_VARIANT: dcmshriram
      AZURE_OPENAI_ENDPOINT: ${AZURE_OPENAI_ENDPOINT:-}
      AZURE_OPENAI_API_KEY: ${AZURE_OPENAI_API_KEY:-}
      AZURE_OPENAI_GPT55_DEPLOYMENT: ${AZURE_OPENAI_GPT55_DEPLOYMENT:-}
      AZURE_OPENAI_DEPLOYMENT: ${AZURE_OPENAI_DEPLOYMENT:-}
      AZURE_OPENAI_DEPLOYMENT_NAME: ${AZURE_OPENAI_DEPLOYMENT_NAME:-}
      AZURE_OPENAI_MODEL: ${AZURE_OPENAI_MODEL:-}
      AZURE_OPENAI_API_STYLE: ${AZURE_OPENAI_API_STYLE:-responses}
      AZURE_OPENAI_API_VERSION: ${AZURE_OPENAI_API_VERSION:-}
      AZURE_OPENAI_TIMEOUT_MS: ${AZURE_OPENAI_TIMEOUT_MS:-}
      AZURE_OPENAI_MAX_OUTPUT_TOKENS: ${AZURE_OPENAI_MAX_OUTPUT_TOKENS:-}
      ECEO_BACKEND_URL: http://partner-dcmshriram-backend:8000
      ECEO_BACKEND_REQUIRED: "1"
    expose:
      - "3000"
    depends_on:
      - backend
    restart: unless-stopped
    networks:
      - cutcompanion_default

  backend:
    build:
      context: ..
      dockerfile: Dockerfile.backend
    image: dcmshriram-eceo-backend:latest
    container_name: partner-dcmshriram-backend
    environment:
      LLM_PROVIDER: ${LLM_PROVIDER:-azure_openai}
      AZURE_OPENAI_ENDPOINT: ${AZURE_OPENAI_ENDPOINT:-}
      AZURE_OPENAI_API_KEY: ${AZURE_OPENAI_API_KEY:-}
      AZURE_OPENAI_GPT55_DEPLOYMENT: ${AZURE_OPENAI_GPT55_DEPLOYMENT:-}
      AZURE_OPENAI_DEPLOYMENT: ${AZURE_OPENAI_DEPLOYMENT:-}
      AZURE_OPENAI_DEPLOYMENT_NAME: ${AZURE_OPENAI_DEPLOYMENT_NAME:-}
      AZURE_OPENAI_MODEL: ${AZURE_OPENAI_MODEL:-}
      AZURE_OPENAI_API_STYLE: ${AZURE_OPENAI_API_STYLE:-responses}
      AZURE_OPENAI_API_VERSION: ${AZURE_OPENAI_API_VERSION:-}
      AZURE_OPENAI_TIMEOUT_MS: ${AZURE_OPENAI_TIMEOUT_MS:-60000}
      ANTHROPIC_API_KEY: ${ANTHROPIC_API_KEY:-}
      ANTHROPIC_MODEL: ${ANTHROPIC_MODEL:-}
      BEDROCK_MODEL_ID: ${BEDROCK_MODEL_ID:-}
      AWS_REGION: ${AWS_REGION:-}
      AWS_DEFAULT_REGION: ${AWS_DEFAULT_REGION:-}
    expose:
      - "8000"
    restart: unless-stopped
    networks:
      - cutcompanion_default

networks:
  cutcompanion_default:
    external: true
