name: Website CI

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main
  workflow_dispatch:

jobs:
  validate:
    name: Validate Next.js site
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
        with:
          run_install: false
      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - run: pnpm exec tsc --noEmit
      - run: pnpm lint
      - run: pnpm build

  amplify-deploy:
    name: Amplify deploy handoff
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    needs: validate
    runs-on: ubuntu-latest
    steps:
      - name: Confirm Amplify auto-deploy
        run: |
          echo "conformal.live deploys from AWS Amplify Hosting."
          echo "Amplify app: dlwwm3b70gv88"
          echo "Branch: main"
          echo "Build spec: amplify.yml"
          echo "The connected Amplify branch starts its production build automatically for this push."
