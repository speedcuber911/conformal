name: Deploy

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
        with:
          version: 10.26.0
      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - run: pnpm lint
      - run: pnpm build

  deploy:
    needs: validate
    runs-on: ubuntu-latest
    concurrency:
      group: dcmshriram-production
      cancel-in-progress: false
    steps:
      - uses: actions/checkout@v4

      - name: Configure SSH
        run: |
          mkdir -p ~/.ssh
          printf '%s\n' "${{ secrets.EC2_SSH_KEY }}" > ~/.ssh/ec2_key
          chmod 600 ~/.ssh/ec2_key
          ssh-keyscan -H "${{ secrets.EC2_HOST }}" >> ~/.ssh/known_hosts

      - name: Sync app to EC2
        run: |
          ssh -i ~/.ssh/ec2_key "${{ secrets.EC2_USER }}@${{ secrets.EC2_HOST }}" 'mkdir -p /home/ubuntu/partner-apps/dcmshriram'
          rsync -az --delete \
            --exclude '.git' \
            --exclude '.next' \
            --exclude 'node_modules' \
            --exclude '.env' \
            --exclude '.env.*' \
            -e "ssh -i ~/.ssh/ec2_key" \
            ./ "${{ secrets.EC2_USER }}@${{ secrets.EC2_HOST }}:/home/ubuntu/partner-apps/dcmshriram/"

      - name: Restart app
        run: |
          ssh -i ~/.ssh/ec2_key "${{ secrets.EC2_USER }}@${{ secrets.EC2_HOST }}" \
            'cd /home/ubuntu/partner-apps/dcmshriram && bash scripts/deploy-ec2.sh'
